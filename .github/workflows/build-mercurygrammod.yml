name: Mercurygrammod1 Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build libgl1-mesa-dev libxcursor-dev \
                              libxrandr-dev libxinerama-dev libxi-dev golang

      - name: Build Mercurygram APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mercurygram-apk
          path: TMessagesProj/build/outputs/apk/release/*.apk
